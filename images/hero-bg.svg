<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 600" preserveAspectRatio="xMidYMax slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1830"/>
      <stop offset="100%" stop-color="#173561"/>
    </linearGradient>
    <linearGradient id="winLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7dd8ff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#4fc3f7" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1600" height="600" fill="url(#sky)"/>

  <!-- far skyline -->
  <g opacity="0.5" fill="#2c5490">
    <rect x="-20" y="300" width="90" height="300"/>
    <rect x="70" y="260" width="70" height="340"/>
    <rect x="150" y="330" width="60" height="270"/>
    <rect x="230" y="280" width="100" height="320"/>
    <rect x="350" y="240" width="60" height="360"/>
    <rect x="430" y="310" width="90" height="290"/>
    <rect x="540" y="270" width="70" height="330"/>
    <rect x="630" y="230" width="80" height="370"/>
    <rect x="730" y="300" width="60" height="300"/>
    <rect x="810" y="260" width="100" height="340"/>
    <rect x="930" y="320" width="70" height="280"/>
    <rect x="1020" y="250" width="60" height="350"/>
    <rect x="1100" y="290" width="90" height="310"/>
    <rect x="1210" y="240" width="70" height="360"/>
    <rect x="1300" y="310" width="80" height="290"/>
    <rect x="1400" y="270" width="100" height="330"/>
    <rect x="1520" y="300" width="90" height="300"/>
  </g>

  <!-- near skyline -->
  <g fill="#1c3f6e">
    <rect x="-40" y="400" width="120" height="220"/>
    <rect x="100" y="360" width="80" height="260"/>
    <rect x="200" y="420" width="140" height="200"/>
    <rect x="360" y="340" width="70" height="280"/>
    <rect x="450" y="390" width="110" height="230"/>
    <rect x="580" y="320" width="90" height="300"/>
    <rect x="690" y="410" width="130" height="210"/>
    <rect x="840" y="350" width="80" height="270"/>
    <rect x="940" y="400" width="150" height="220"/>
    <rect x="1110" y="330" width="90" height="290"/>
    <rect x="1220" y="400" width="120" height="220"/>
    <rect x="1360" y="360" width="80" height="260"/>
    <rect x="1460" y="410" width="140" height="210"/>
    <rect x="1580" y="380" width="60" height="240"/>
  </g>

  <!-- windows on near skyline -->
  <g fill="url(#winLight)">
    <g id="wcol">
      <rect x="0" y="0" width="10" height="14"/>
      <rect x="22" y="0" width="10" height="14"/>
      <rect x="0" y="26" width="10" height="14"/>
      <rect x="22" y="26" width="10" height="14"/>
      <rect x="0" y="52" width="10" height="14"/>
      <rect x="22" y="52" width="10" height="14"/>
      <rect x="0" y="78" width="10" height="14"/>
      <rect x="22" y="78" width="10" height="14"/>
    </g>
    <use href="#wcol" x="-25" y="420"/>
    <use href="#wcol" x="120" y="380"/>
    <use href="#wcol" x="150" y="380"/>
    <use href="#wcol" x="220" y="440"/>
    <use href="#wcol" x="260" y="440"/>
    <use href="#wcol" x="290" y="440"/>
    <use href="#wcol" x="380" y="360"/>
    <use href="#wcol" x="470" y="410"/>
    <use href="#wcol" x="500" y="410"/>
    <use href="#wcol" x="600" y="340"/>
    <use href="#wcol" x="630" y="340"/>
    <use href="#wcol" x="710" y="430"/>
    <use href="#wcol" x="750" y="430"/>
    <use href="#wcol" x="780" y="430"/>
    <use href="#wcol" x="860" y="370"/>
    <use href="#wcol" x="960" y="420"/>
    <use href="#wcol" x="1000" y="420"/>
    <use href="#wcol" x="1040" y="420"/>
    <use href="#wcol" x="1130" y="350"/>
    <use href="#wcol" x="1160" y="350"/>
    <use href="#wcol" x="1240" y="420"/>
    <use href="#wcol" x="1280" y="420"/>
    <use href="#wcol" x="1380" y="380"/>
    <use href="#wcol" x="1480" y="430"/>
    <use href="#wcol" x="1520" y="430"/>
    <use href="#wcol" x="1560" y="430"/>
  </g>

  <!-- ground haze -->
  <rect x="0" y="560" width="1600" height="40" fill="#0a1830" opacity="0.7"/>
</svg>
